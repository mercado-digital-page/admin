<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Clientes</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
  <style>
    * {
      font-family: 'Montserrat', sans-serif;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#03152A',
            accent: '#69D6E9',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50">
  <div class="container mx-auto px-4 py-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 pb-4 border-b border-gray-200">
      <h1 class="text-3xl font-bold text-gray-800">Gestor de Clientes</h1>
      <div class="relative w-full md:w-96">
        <input type="text" id="searchInput" placeholder="Buscar clientes..." 
               class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
        <button id="searchBtn" class="absolute right-0 top-0 h-full px-4 bg-accent text-white rounded-r-lg hover:bg-primary transition-colors">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </header>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="clientList">
      <!-- Los clientes se cargarán aquí dinámicamente -->
    </div>
  </div>
  
  <!-- Modal de Detalles del Cliente -->
  <div id="clientDetails" class="fixed inset-0 bg-black bg-opacity-70 z-50 overflow-y-auto hidden">
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden">
        <!-- Header con banner -->
        <div id="detailsHeader" class="h-48 bg-primary relative">
          <div class="absolute -bottom-12 left-6 w-24 h-24 rounded-full bg-white shadow-lg border-4 border-white overflow-hidden">
            <img id="clientLogo" src="" alt="Logo" class="w-full h-full object-contain">
          </div>
        </div>
        
        <!-- Cuerpo del modal -->
        <div class="p-6 pt-16" id="detailsBody">
          <!-- Contenido se carga dinámicamente -->
        </div>
        
        <!-- Botones de cierre y edición -->
        <button id="closeDetails" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-accent">
          <i class="fas fa-times"></i>
        </button>
        <button id="editClient" class="absolute top-4 right-16 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-accent">
          <i class="fas fa-edit"></i>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Modal de Edición -->
  <div id="editForm" class="fixed inset-0 bg-black bg-opacity-70 z-50 overflow-y-auto hidden">
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden">
        <div class="p-6">
          <h2 class="text-2xl font-bold mb-6 text-primary border-b-2 border-accent pb-2">Editar Cliente</h2>
          <form id="clientForm">
            <input type="hidden" id="editId">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <div class="space-y-4">
                <div>
                  <label for="editName" class="block text-sm font-medium text-gray-700 mb-1">Nombre de la empresa</label>
                  <input type="text" id="editName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>
                
                <div>
                  <label for="editSlogan" class="block text-sm font-medium text-gray-700 mb-1">Slogan</label>
                  <input type="text" id="editSlogan" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>
                
                <div>
                  <label for="editPrimaryColor" class="block text-sm font-medium text-gray-700 mb-1">Color primario</label>
                  <div class="flex items-center gap-2">
                    <input type="color" id="editPrimaryColor" class="w-12 h-12 border border-gray-300 rounded-md">
                    <input type="text" id="editPrimaryColorText" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                  </div>
                </div>
                
                <div>
                  <label for="editAccentColor" class="block text-sm font-medium text-gray-700 mb-1">Color secundario</label>
                  <div class="flex items-center gap-2">
                    <input type="color" id="editAccentColor" class="w-12 h-12 border border-gray-300 rounded-md">
                    <input type="text" id="editAccentColorText" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                  </div>
                </div>
              </div>
              
              <div class="space-y-4">
                <div>
                  <label for="editCategory" class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                  <input type="text" id="editCategory" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>
                
                <div>
                  <label for="editType" class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                  <select id="editType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                    <option value="Empresa">Empresa</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Freelancer">Freelancer</option>
                  </select>
                </div>
                
                <div>
                  <label for="editLocation" class="block text-sm font-medium text-gray-700 mb-1">Ubicación</label>
                  <input type="text" id="editLocation" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>
                
                <div>
                  <label for="editMapsLink" class="block text-sm font-medium text-gray-700 mb-1">Enlace de Google Maps</label>
                  <input type="url" id="editMapsLink" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>
              </div>
            </div>
            
            <div class="mb-6">
              <label for="editAbout" class="block text-sm font-medium text-gray-700 mb-1">Acerca de</label>
              <textarea id="editAbout" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent"></textarea>
            </div>
            
            <div class="flex justify-end gap-3">
              <button type="button" id="cancelEdit" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition-colors">Cancelar</button>
              <button type="submit" class="px-4 py-2 bg-accent text-white rounded-md hover:bg-primary transition-colors">Guardar cambios</button>
            </div>
          </form>
        </div>
        
        <button id="closeEdit" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-accent">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Variables globales
    let clients = [];
    let currentClient = null;
    const baseImagePath = "";
    
    // Elementos del DOM
    const clientList = document.getElementById('clientList');
    const clientDetails = document.getElementById('clientDetails');
    const detailsHeader = document.getElementById('detailsHeader');
    const detailsBody = document.getElementById('detailsBody');
    const clientLogo = document.getElementById('clientLogo');
    const closeDetails = document.getElementById('closeDetails');
    const editClient = document.getElementById('editClient');
    const editForm = document.getElementById('editForm');
    const clientForm = document.getElementById('clientForm');
    const cancelEdit = document.getElementById('cancelEdit');
    const closeEdit = document.getElementById('closeEdit');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const editPrimaryColor = document.getElementById('editPrimaryColor');
    const editPrimaryColorText = document.getElementById('editPrimaryColorText');
    const editAccentColor = document.getElementById('editAccentColor');
    const editAccentColorText = document.getElementById('editAccentColorText');
    
    // Cargar datos de clientes
    async function loadClients() {
      try {
        const response = await fetch('https://mercado-digital-page.github.io/admin/clientes/data.json');
        clients = await response.json();
        renderClientList(clients);
      } catch (error) {
        console.error('Error al cargar los clientes:', error);
        clientList.innerHTML = `
          <div class="col-span-full py-10 text-center text-gray-500">
            <i class="fas fa-exclamation-triangle text-3xl mb-3 text-accent"></i>
            <p class="text-lg">Error al cargar los clientes. Por favor, intente nuevamente.</p>
          </div>
        `;
      }
    }
    
    // Renderizar lista de clientes
    function renderClientList(clientsToRender) {
      if (clientsToRender.length === 0) {
        clientList.innerHTML = `
          <div class="col-span-full py-16 text-center">
            <i class="fas fa-search text-4xl mb-4 text-gray-400"></i>
            <h3 class="text-xl font-medium text-gray-600 mb-2">No se encontraron resultados</h3>
            <p class="text-gray-500">No hay clientes que coincidan con tu búsqueda</p>
          </div>
        `;
        return;
      }
      
      clientList.innerHTML = clientsToRender.map(client => {
        const logoPath = client.logo ? baseImagePath + client.logo : 
                         client.primaryLogo ? baseImagePath + client.primaryLogo : 
                         client.profileImage ? baseImagePath + client.profileImage : '';
        
        return `
          <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow cursor-pointer" 
               data-id="${client.id}" 
               style="--primary-color: ${client.primaryColor}; --accent-color: ${client.accentColor}">
            <div class="h-32" style="background: ${client.primaryColor}">
              ${client.banner ? `
                <img src="${baseImagePath + client.banner}" alt="${client.name}" class="w-full h-full object-cover">
              ` : ''}
            </div>
            <div class="p-5 relative">
              <div class="absolute -top-8 left-5 w-16 h-16 rounded-full bg-white shadow-md border-4 border-white overflow-hidden">
                ${logoPath ? `
                  <img src="${logoPath}" alt="${client.name}" class="w-full h-full object-contain">
                ` : `
                  <div class="w-full h-full flex items-center justify-center font-bold text-lg" style="color: ${client.primaryColor}">
                    ${getInitials(client.name)}
                  </div>
                `}
              </div>
              <h3 class="text-lg font-semibold mt-4" style="color: ${client.primaryColor}">${client.name}</h3>
              <p class="text-sm text-gray-500 italic mb-2">${client.slogan}</p>
              <span class="inline-block px-2 py-1 text-xs rounded-md bg-gray-100 text-gray-700">
                ${client.category}
              </span>
            </div>
          </div>
        `;
      }).join('');
      
      // Agregar event listeners a las tarjetas
      document.querySelectorAll('[data-id]').forEach(card => {
        card.addEventListener('click', () => {
          const clientId = card.getAttribute('data-id');
          showClientDetails(clientId);
        });
      });
    }
    
    // Mostrar detalles del cliente
    function showClientDetails(clientId) {
      currentClient = clients.find(c => c.id === clientId);
      if (!currentClient) return;
      
      // Configurar imágenes
      const bannerPath = currentClient.banner ? baseImagePath + currentClient.banner : '';
      const logoPath = currentClient.logo ? baseImagePath + currentClient.logo : 
                      currentClient.primaryLogo ? baseImagePath + currentClient.primaryLogo : 
                      currentClient.profileImage ? baseImagePath + currentClient.profileImage : '';
      
      // Configurar encabezado
      detailsHeader.style.backgroundColor = currentClient.primaryColor;
      if (bannerPath) {
        detailsHeader.innerHTML = `<img src="${bannerPath}" alt="${currentClient.name}" class="w-full h-full object-cover">`;
      } else {
        detailsHeader.innerHTML = '';
      }
      
      if (logoPath) {
        clientLogo.src = logoPath;
        clientLogo.alt = currentClient.name;
      } else {
        clientLogo.src = '';
        clientLogo.alt = '';
        clientLogo.innerHTML = `
          <div class="w-full h-full flex items-center justify-center font-bold text-2xl" style="color: ${currentClient.primaryColor}">
            ${getInitials(currentClient.name)}
          </div>
        `;
      }
      
      // Configurar cuerpo
      detailsBody.innerHTML = `
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
          <div>
            <h1 class="text-3xl font-bold" style="color: ${currentClient.primaryColor}">${currentClient.name}</h1>
            <p class="text-gray-600 italic">${currentClient.slogan}</p>
          </div>
          <div class="flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-full">
            <i class="fas fa-shield-alt" style="color: ${currentClient.accentColor}"></i>
            <span class="font-medium">Puntaje de confiabilidad:</span>
            <span class="font-bold" style="color: ${currentClient.primaryColor}">${currentClient.reliabilityScore}%</span>
          </div>
        </div>
        
        <div class="flex flex-wrap gap-3 mb-6">
          <div class="flex items-center gap-1 text-sm text-gray-600">
            <i class="fas fa-map-marker-alt" style="color: ${currentClient.accentColor}"></i>
            ${currentClient.location}
          </div>
          <div class="flex items-center gap-1 text-sm text-gray-600">
            <i class="fas fa-tag" style="color: ${currentClient.accentColor}"></i>
            ${currentClient.category}
          </div>
          <div class="flex items-center gap-1 text-sm text-gray-600">
            <i class="fas fa-user-tie" style="color: ${currentClient.accentColor}"></i>
            ${currentClient.type}
          </div>
        </div>
        
        <div class="mb-8">
          <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor}">Acerca de</h2>
          <p class="text-gray-700">${currentClient.about}</p>
        </div>
        
        <div class="mb-8">
          <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor}">Servicios</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${currentClient.services.map(service => `
              <div class="bg-gray-50 p-4 rounded-lg hover:shadow-md transition-shadow">
                <div class="text-3xl mb-2" style="color: ${currentClient.accentColor}">
                  <iconify-icon icon="${service.icon}"></iconify-icon>
                </div>
                <h3 class="font-semibold mb-1" style="color: ${currentClient.primaryColor}">${service.name}</h3>
                <p class="text-sm text-gray-600">${service.description}</p>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="mb-8">
          <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor}">¿Por qué elegirnos?</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${currentClient.whyChooseUs.map(reason => `
              <div class="bg-gray-50 p-4 rounded-lg">
                <div class="text-3xl mb-2" style="color: ${currentClient.accentColor}">
                  <iconify-icon icon="${reason.icon}"></iconify-icon>
                </div>
                <h3 class="font-semibold mb-1" style="color: ${currentClient.primaryColor}">${reason.title}</h3>
                <p class="text-sm text-gray-600">${reason.text}</p>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="mb-8">
          <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor}">Contacto</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor}">Teléfonos</h3>
              <div class="space-y-2">
                ${currentClient.phones.map(phone => `
                  <div class="flex items-start gap-2">
                    <div class="mt-1 w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fas fa-phone text-white text-sm"></i>
                    </div>
                    <div>
                      <p class="text-sm">${phone.number}</p>
                      ${phone.ctaText ? `
                        <a href="https://wa.me/${phone.whatsapp}" target="_blank" 
                           class="text-xs font-medium" style="color: ${currentClient.accentColor}">
                          ${phone.ctaText}
                        </a>
                      ` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
            
            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor}">Correos</h3>
              <div class="space-y-2">
                ${currentClient.emails.map(email => `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fas fa-envelope text-white text-sm"></i>
                    </div>
                    <a href="mailto:${email}" class="text-sm hover:underline">${email}</a>
                  </div>
                `).join('')}
              </div>
            </div>
            
            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor}">Redes Sociales</h3>
              <div class="space-y-2">
                ${currentClient.facebook ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fab fa-facebook-f text-white text-sm"></i>
                    </div>
                    <a href="${currentClient.facebook}" target="_blank" class="text-sm hover:underline">Facebook</a>
                  </div>
                ` : ''}
                
                ${currentClient.instagram ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fab fa-instagram text-white text-sm"></i>
                    </div>
                    <a href="${currentClient.instagram}" target="_blank" class="text-sm hover:underline">Instagram</a>
                  </div>
                ` : ''}
                
                ${currentClient.tiktok ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fab fa-tiktok text-white text-sm"></i>
                    </div>
                    <a href="${currentClient.tiktok}" target="_blank" class="text-sm hover:underline">TikTok</a>
                  </div>
                ` : ''}
              </div>
            </div>
            
            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor}">Otros</h3>
              <div class="space-y-2">
                ${currentClient.mapsLink ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fas fa-map-marker-alt text-white text-sm"></i>
                    </div>
                    <a href="${currentClient.mapsLink}" target="_blank" class="text-sm hover:underline">Ver en mapa</a>
                  </div>
                ` : ''}
                
                ${currentClient.website ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: ${currentClient.accentColor}">
                      <i class="fas fa-globe text-white text-sm"></i>
                    </div>
                    <a href="${currentClient.website}" target="_blank" class="text-sm hover:underline">Sitio web</a>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        </div>
        
        ${currentClient.phones.some(p => p.isPrimaryCta) ? `
          <div class="text-center">
            <a href="https://wa.me/${currentClient.phones.find(p => p.isPrimaryCta).whatsapp}" 
               target="_blank" 
               class="inline-block px-6 py-3 rounded-full font-medium text-white hover:shadow-lg transition-all"
               style="background: ${currentClient.accentColor}">
              ${currentClient.phones.find(p => p.isPrimaryCta).ctaText}
            </a>
          </div>
        ` : ''}
      `;
      
      // Mostrar detalles
      clientDetails.classList.remove('hidden');
    }
    
    // Mostrar formulario de edición
    function showEditForm() {
      if (!currentClient) return;
      
      // Llenar formulario con datos actuales
      document.getElementById('editId').value = currentClient.id;
      document.getElementById('editName').value = currentClient.name;
      document.getElementById('editSlogan').value = currentClient.slogan;
      document.getElementById('editAbout').value = currentClient.about;
      editPrimaryColor.value = currentClient.primaryColor;
      editPrimaryColorText.value = currentClient.primaryColor;
      editAccentColor.value = currentClient.accentColor;
      editAccentColorText.value = currentClient.accentColor;
      document.getElementById('editLocation').value = currentClient.location;
      document.getElementById('editMapsLink').value = currentClient.mapsLink;
      document.getElementById('editCategory').value = currentClient.category;
      document.getElementById('editType').value = currentClient.type;
      
      // Mostrar formulario
      clientDetails.classList.add('hidden');
      editForm.classList.remove('hidden');
    }
    
    // Guardar cambios del cliente
    function saveClientChanges(e) {
      e.preventDefault();
      
      if (!currentClient) return;
      
      // Actualizar datos del cliente
      currentClient.name = document.getElementById('editName').value;
      currentClient.slogan = document.getElementById('editSlogan').value;
      currentClient.about = document.getElementById('editAbout').value;
      currentClient.primaryColor = editPrimaryColor.value;
      currentClient.accentColor = editAccentColor.value;
      currentClient.location = document.getElementById('editLocation').value;
      currentClient.mapsLink = document.getElementById('editMapsLink').value;
      currentClient.category = document.getElementById('editCategory').value;
      currentClient.type = document.getElementById('editType').value;
      
      // Actualizar lista y detalles
      renderClientList(clients);
      showClientDetails(currentClient.id);
      
      // Ocultar formulario
      editForm.classList.add('hidden');
      
      // Aquí podrías agregar código para guardar los cambios en el servidor
      alert('Cambios guardados (en memoria). Nota: Para persistir los cambios, necesitarías implementar el guardado en el servidor).');
    }
    
    // Buscar clientes
    function searchClients() {
      const searchTerm = searchInput.value.toLowerCase();
      if (!searchTerm) {
        renderClientList(clients);
        return;
      }
      
      const filteredClients = clients.filter(client => 
        client.name.toLowerCase().includes(searchTerm) || 
        client.slogan.toLowerCase().includes(searchTerm) || 
        client.category.toLowerCase().includes(searchTerm) ||
        client.location.toLowerCase().includes(searchTerm) ||
        client.about.toLowerCase().includes(searchTerm)
      );
      
      renderClientList(filteredClients);
    }
    
    // Helper para obtener iniciales
    function getInitials(name) {
      return name.split(' ')
        .map(word => word[0])
        .join('')
        .toUpperCase()
        .substring(0, 2);
    }
    
    // Sincronizar inputs de color
    function syncColorInputs() {
      editPrimaryColor.addEventListener('input', () => {
        editPrimaryColorText.value = editPrimaryColor.value;
      });
      
      editPrimaryColorText.addEventListener('input', () => {
        if (/^#[0-9A-F]{6}$/i.test(editPrimaryColorText.value)) {
          editPrimaryColor.value = editPrimaryColorText.value;
        }
      });
      
      editAccentColor.addEventListener('input', () => {
        editAccentColorText.value = editAccentColor.value;
      });
      
      editAccentColorText.addEventListener('input', () => {
        if (/^#[0-9A-F]{6}$/i.test(editAccentColorText.value)) {
          editAccentColor.value = editAccentColorText.value;
        }
      });
    }
    
    // Event listeners
    closeDetails.addEventListener('click', () => {
      clientDetails.classList.add('hidden');
    });
    
    editClient.addEventListener('click', showEditForm);
    
    clientForm.addEventListener('submit', saveClientChanges);
    
    cancelEdit.addEventListener('click', () => {
      editForm.classList.add('hidden');
      clientDetails.classList.remove('hidden');
    });
    
    closeEdit.addEventListener('click', () => {
      editForm.classList.add('hidden');
    });
    
    searchBtn.addEventListener('click', searchClients);
    
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        searchClients();
      }
    });
    
    // Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      loadClients();
      syncColorInputs();
    });
  </script>
</body>
</html>

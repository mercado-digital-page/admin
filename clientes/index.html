<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Clientes</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>
  <style>
    * {
      font-family: 'Poppins', sans-serif;
    }
    /* Scrollbar styling for modals if needed */
    .modal-body-scroll::-webkit-scrollbar {
        width: 8px;
    }
    .modal-body-scroll::-webkit-scrollbar-thumb {
        background-color: #cbd5e1; /* gray-300 */
        border-radius: 4px;
    }
    .modal-body-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #94a3b8; /* gray-400 */
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Estos colores primario y de acento son genéricos,
            // se sobreescribirán dinámicamente por cliente.
            primary: '#03152A',
            accent: '#69D6E9',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50">
  <div class="container mx-auto px-4 py-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 pb-4 border-b border-gray-200">
      <h1 class="text-3xl font-bold text-gray-800">Gestor de Clientes</h1>
      <div class="relative w-full md:w-96">
        <input type="text" id="searchInput" placeholder="Buscar clientes..."
               class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
        <button id="searchBtn" class="absolute right-0 top-0 h-full px-4 bg-accent text-white rounded-r-lg hover:bg-primary transition-colors">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="clientList">
      </div>
  </div>

  <div id="clientDetails" class="fixed inset-0 bg-black bg-opacity-70 z-50 overflow-y-auto hidden">
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden">
        <div id="detailsHeaderContainer" class="relative">
            <div id="detailsHeader" class="h-48 bg-primary">
                </div>
            <div class="absolute -bottom-12 left-6 w-24 h-24 rounded-full bg-white shadow-lg border-4 border-white overflow-hidden flex items-center justify-center">
                <img id="clientLogo" src="" alt="Logo" class="w-full h-full object-contain">
                <div id="clientLogoInitials" class="w-full h-full flex items-center justify-center font-bold text-2xl"></div>
            </div>
        </div>

        <div class="p-6 pt-16 modal-body-scroll max-h-[calc(100vh-12rem)] overflow-y-auto" id="detailsBody">
          </div>

        <button id="closeDetails" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-accent transition-colors">
          <i class="fas fa-times"></i>
        </button>
        <button id="editClient" class="absolute top-4 right-16 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-accent transition-colors">
          <i class="fas fa-edit"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="editForm" class="fixed inset-0 bg-black bg-opacity-70 z-50 overflow-y-auto hidden">
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-2xl">
        <div class="p-6 modal-body-scroll max-h-[calc(100vh-8rem)] overflow-y-auto">
          <h2 class="text-2xl font-bold mb-6 text-primary border-b-2 border-accent pb-2">Editar Cliente</h2>
          <form id="clientForm">
            <input type="hidden" id="editId">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <div class="space-y-4">
                <div>
                  <label for="editName" class="block text-sm font-medium text-gray-700 mb-1">Nombre de la empresa</label>
                  <input type="text" id="editName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>

                <div>
                  <label for="editSlogan" class="block text-sm font-medium text-gray-700 mb-1">Slogan</label>
                  <input type="text" id="editSlogan" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>

                <div>
                  <label for="editPrimaryColor" class="block text-sm font-medium text-gray-700 mb-1">Color primario</label>
                  <div class="flex items-center gap-2">
                    <input type="color" id="editPrimaryColor" class="w-12 h-12 border border-gray-300 rounded-md p-1">
                    <input type="text" id="editPrimaryColorText" placeholder="#RRGGBB" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                  </div>
                </div>

                <div>
                  <label for="editAccentColor" class="block text-sm font-medium text-gray-700 mb-1">Color secundario</label>
                  <div class="flex items-center gap-2">
                    <input type="color" id="editAccentColor" class="w-12 h-12 border border-gray-300 rounded-md p-1">
                    <input type="text" id="editAccentColorText" placeholder="#RRGGBB" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                  </div>
                </div>
              </div>

              <div class="space-y-4">
                <div>
                  <label for="editCategory" class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                  <input type="text" id="editCategory" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>

                <div>
                  <label for="editType" class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                  <select id="editType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                    <option value="Empresa">Empresa</option>
                    <option value="Técnico">Técnico</option>
                    <option value="Freelancer">Freelancer</option>
                  </select>
                </div>

                <div>
                  <label for="editLocation" class="block text-sm font-medium text-gray-700 mb-1">Ubicación</label>
                  <input type="text" id="editLocation" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>

                <div>
                  <label for="editMapsLink" class="block text-sm font-medium text-gray-700 mb-1">Enlace de Google Maps</label>
                  <input type="url" id="editMapsLink" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent">
                </div>
              </div>
            </div>

            <div class="mb-6">
              <label for="editAbout" class="block text-sm font-medium text-gray-700 mb-1">Acerca de</label>
              <textarea id="editAbout" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent"></textarea>
            </div>

            <div class="flex justify-end gap-3">
              <button type="button" id="cancelEdit" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 transition-colors">Cancelar</button>
              <button type="submit" class="px-4 py-2 bg-accent text-white rounded-md hover:bg-primary transition-colors">Guardar cambios</button>
            </div>
          </form>
        </div>

        <button id="closeEdit" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-gray-700 hover:text-accent transition-colors">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Variables globales
    let clients = [];
    let currentClient = null;
    // Nota: La validez de 'baseImagePath' dependerá de la estructura de tu proyecto
    // y dónde se sirva este HTML en relación con las imágenes.
    // Si las imágenes en el JSON ya son rutas completas o relativas correctas,
    // podrías no necesitar 'baseImagePath' o ajustarla.
    const baseImagePath = "../../../admin/clientes/"; // Asumido por la IA original

    // Elementos del DOM
    const clientList = document.getElementById('clientList');
    const clientDetails = document.getElementById('clientDetails');
    const detailsHeaderContainer = document.getElementById('detailsHeaderContainer');
    const detailsHeader = document.getElementById('detailsHeader');
    const detailsBody = document.getElementById('detailsBody');
    const clientLogo = document.getElementById('clientLogo');
    const clientLogoInitials = document.getElementById('clientLogoInitials');
    const closeDetailsBtn = document.getElementById('closeDetails'); // Renombrado para claridad
    const editClientBtn = document.getElementById('editClient'); // Renombrado para claridad
    const editFormModal = document.getElementById('editForm'); // Renombrado para claridad
    const clientForm = document.getElementById('clientForm');
    const cancelEditBtn = document.getElementById('cancelEdit'); // Renombrado para claridad
    const closeEditBtn = document.getElementById('closeEdit'); // Renombrado para claridad
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const editPrimaryColor = document.getElementById('editPrimaryColor');
    const editPrimaryColorText = document.getElementById('editPrimaryColorText');
    const editAccentColor = document.getElementById('editAccentColor');
    const editAccentColorText = document.getElementById('editAccentColorText');

    // Función para obtener iniciales
    function getInitials(name) {
        if (!name) return '';
        const words = name.trim().split(/\s+/);
        if (words.length === 1) {
            return name.substring(0, 2).toUpperCase();
        }
        return words.map(word => word[0]).join('').toUpperCase().substring(0, 2);
    }

    // Cargar datos de clientes
    async function loadClients() {
      try {
        const response = await fetch('https://mercado-digital-page.github.io/admin/clientes/data.json');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        clients = await response.json();
        renderClientList(clients);
      } catch (error) {
        console.error('Error al cargar los clientes:', error);
        clientList.innerHTML = `
          <div class="col-span-full py-10 text-center text-gray-500">
            <i class="fas fa-exclamation-triangle text-3xl mb-3 text-red-500"></i>
            <p class="text-lg">Error al cargar los clientes. Por favor, intente nuevamente.</p>
            <p class="text-sm">${error.message}</p>
          </div>
        `;
      }
    }

    // Renderizar lista de clientes
    function renderClientList(clientsToRender) {
      if (clientsToRender.length === 0) {
        clientList.innerHTML = `
          <div class="col-span-full py-16 text-center">
            <i class="fas fa-search text-4xl mb-4 text-gray-400"></i>
            <h3 class="text-xl font-medium text-gray-600 mb-2">No se encontraron resultados</h3>
            <p class="text-gray-500">No hay clientes que coincidan con tu búsqueda.</p>
          </div>
        `;
        return;
      }

      clientList.innerHTML = clientsToRender.map(client => {
        // La IA original buscaba client.logo, client.primaryLogo, client.profileImage.
        // El JSON de ejemplo no los tiene a nivel raíz. Se asume que si existieran,
        // contendrían rutas relativas a 'baseImagePath'.
        const logoFileName = client.logo || client.primaryLogo || client.profileImage;
        const logoPath = logoFileName ? baseImagePath + logoFileName : '';
        const bannerFileName = client.banner;
        const bannerPath = bannerFileName ? baseImagePath + bannerFileName : '';

        return `
          <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow cursor-pointer"
               data-id="${client.id}"
               style="--primary-color: ${client.primaryColor || '#333'}; --accent-color: ${client.accentColor || '#777'}">
            <div class="h-32" style="background: ${bannerPath ? `url('${bannerPath}') center center / cover` : client.primaryColor || '#333'}">
              ${!bannerPath && client.banner ? `<img src="${bannerPath}" alt="${client.name} banner" class="w-full h-full object-cover">` : ''}
            </div>
            <div class="p-5 relative">
              <div class="absolute -top-8 left-5 w-16 h-16 rounded-full bg-white shadow-md border-4 border-white overflow-hidden flex items-center justify-center">
                ${logoPath ? `
                  <img src="${logoPath}" alt="${client.name} logo" class="w-full h-full object-contain">
                ` : `
                  <div class="w-full h-full flex items-center justify-center font-bold text-lg" style="color: ${client.primaryColor || '#333'}; background-color: ${client.accentColor || '#EEE'}33;">
                    ${getInitials(client.name)}
                  </div>
                `}
              </div>
              <h3 class="text-lg font-semibold mt-4" style="color: ${client.primaryColor || '#333'}">${client.name}</h3>
              <p class="text-sm text-gray-500 italic mb-2 truncate" title="${client.slogan || ''}">${client.slogan || 'Sin slogan'}</p>
              <span class="inline-block px-2 py-1 text-xs rounded-md bg-gray-100 text-gray-700">
                ${client.category || 'Sin categoría'}
              </span>
            </div>
          </div>
        `;
      }).join('');

      // Agregar event listeners a las tarjetas
      document.querySelectorAll('[data-id]').forEach(card => {
        card.addEventListener('click', () => {
          const clientId = card.getAttribute('data-id');
          showClientDetails(clientId);
        });
      });
    }

    // Mostrar detalles del cliente
    function showClientDetails(clientId) {
      currentClient = clients.find(c => c.id === clientId);
      if (!currentClient) return;

      const logoFileName = currentClient.logo || currentClient.primaryLogo || currentClient.profileImage;
      const logoPath = logoFileName ? baseImagePath + logoFileName : '';
      const bannerFileName = currentClient.banner;
      const bannerPath = bannerFileName ? baseImagePath + bannerFileName : '';

      detailsHeader.style.backgroundColor = bannerPath ? 'transparent' : (currentClient.primaryColor || '#333');
      detailsHeader.innerHTML = bannerPath ? `<img src="${bannerPath}" alt="${currentClient.name} banner" class="w-full h-full object-cover">` : '';
      
      clientLogo.src = logoPath;
      clientLogo.alt = logoPath ? `${currentClient.name} logo` : '';
      clientLogo.style.display = logoPath ? 'block' : 'none';

      clientLogoInitials.innerHTML = !logoPath ? getInitials(currentClient.name) : '';
      clientLogoInitials.style.color = !logoPath ? (currentClient.primaryColor || '#333') : '';
      clientLogoInitials.style.backgroundColor = !logoPath ? `${currentClient.accentColor || '#EEE'}33` : '';
      clientLogoInitials.style.display = !logoPath ? 'flex' : 'none';


      detailsBody.innerHTML = `
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
          <div>
            <h1 class="text-3xl font-bold" style="color: ${currentClient.primaryColor || '#333'}">${currentClient.name}</h1>
            <p class="text-gray-600 italic">${currentClient.slogan || ''}</p>
          </div>
          ${currentClient.reliabilityScore ? `
            <div class="flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-full">
              <i class="fas fa-shield-alt" style="color: ${currentClient.accentColor || '#777'}"></i>
              <span class="font-medium">Puntaje de confiabilidad:</span>
              <span class="font-bold" style="color: ${currentClient.primaryColor || '#333'}">${currentClient.reliabilityScore}%</span>
            </div>
          ` : ''}
        </div>

        <div class="flex flex-wrap gap-x-4 gap-y-2 mb-6">
          ${currentClient.location ? `
            <div class="flex items-center gap-1 text-sm text-gray-600">
              <i class="fas fa-map-marker-alt" style="color: ${currentClient.accentColor || '#777'}"></i>
              ${currentClient.location}
            </div>` : ''}
          ${currentClient.category ? `
            <div class="flex items-center gap-1 text-sm text-gray-600">
              <i class="fas fa-tag" style="color: ${currentClient.accentColor || '#777'}"></i>
              ${currentClient.category}
            </div>` : ''}
          ${currentClient.type ? `
            <div class="flex items-center gap-1 text-sm text-gray-600">
              <i class="fas fa-user-tie" style="color: ${currentClient.accentColor || '#777'}"></i>
              ${currentClient.type}
            </div>` : ''}
        </div>

        ${currentClient.about ? `
          <div class="mb-8">
            <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor || '#777'}">Acerca de</h2>
            <p class="text-gray-700 whitespace-pre-wrap">${currentClient.about}</p>
          </div>` : ''}

        ${currentClient.services && currentClient.services.length > 0 ? `
          <div class="mb-8">
            <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor || '#777'}">Servicios</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              ${currentClient.services.map(service => `
                <div class="bg-gray-50 p-4 rounded-lg hover:shadow-md transition-shadow">
                  ${service.image ? `<img src="${service.image}" alt="${service.name}" class="w-full h-32 object-cover rounded-md mb-3">` : ''}
                  <div class="text-3xl mb-2" style="color: ${currentClient.accentColor || '#777'}">
                    <iconify-icon icon="${service.icon || 'mdi:tools'}"></iconify-icon>
                  </div>
                  <h3 class="font-semibold mb-1" style="color: ${currentClient.primaryColor || '#333'}">${service.name}</h3>
                  <p class="text-sm text-gray-600">${service.description}</p>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

        ${currentClient.whyChooseUs && currentClient.whyChooseUs.length > 0 ? `
          <div class="mb-8">
            <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor || '#777'}">¿Por qué elegirnos?</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              ${currentClient.whyChooseUs.map(reason => `
                <div class="bg-gray-50 p-4 rounded-lg">
                  <div class="text-3xl mb-2" style="color: ${currentClient.accentColor || '#777'}">
                    <iconify-icon icon="${reason.icon || 'mdi:star-circle'}"></iconify-icon>
                  </div>
                  <h3 class="font-semibold mb-1" style="color: ${currentClient.primaryColor || '#333'}">${reason.title}</h3>
                  <p class="text-sm text-gray-600">${reason.text}</p>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

        <div class="mb-8">
          <h2 class="text-xl font-semibold mb-3 pb-1 border-b-2" style="border-color: ${currentClient.accentColor || '#777'}">Contacto</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor || '#333'}">Teléfonos</h3>
              <div class="space-y-2">
                ${currentClient.phones && currentClient.phones.length > 0 ? currentClient.phones.map(phone => `
                  <div class="flex items-start gap-2">
                    <div class="mt-1 w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: ${currentClient.accentColor || '#777'}">
                      <i class="fas fa-phone text-white text-sm"></i>
                    </div>
                    <div>
                      <p class="text-sm">${phone.number}</p>
                      ${phone.ctaText && phone.whatsapp ? `
                        <a href="https://wa.me/${phone.whatsapp.replace(/\+/g, '')}" target="_blank"
                           class="text-xs font-medium hover:underline" style="color: ${currentClient.accentColor || '#777'}">
                          ${phone.ctaText} <i class="fab fa-whatsapp"></i>
                        </a>
                      ` : ''}
                    </div>
                  </div>
                `).join('') : '<p class="text-sm text-gray-500">No disponible</p>'}
              </div>
            </div>

            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor || '#333'}">Correos</h3>
              <div class="space-y-2">
                ${currentClient.emails && currentClient.emails.length > 0 ? currentClient.emails.map(email => `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: ${currentClient.accentColor || '#777'}">
                      <i class="fas fa-envelope text-white text-sm"></i>
                    </div>
                    <a href="mailto:${email}" class="text-sm hover:underline break-all">${email}</a>
                  </div>
                `).join('') : '<p class="text-sm text-gray-500">No disponible</p>'}
              </div>
            </div>

            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor || '#333'}">Redes Sociales</h3>
              <div class="flex flex-wrap gap-3">
                ${currentClient.facebook ? `
                  <a href="${currentClient.facebook}" target="_blank" class="w-8 h-8 rounded-full flex items-center justify-center text-white hover:opacity-80 transition-opacity" style="background: #1877F2;" title="Facebook">
                    <i class="fab fa-facebook-f text-sm"></i></a>` : ''}
                ${currentClient.instagram ? `
                  <a href="${currentClient.instagram}" target="_blank" class="w-8 h-8 rounded-full flex items-center justify-center text-white hover:opacity-80 transition-opacity" style="background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);" title="Instagram">
                    <i class="fab fa-instagram text-sm"></i></a>` : ''}
                ${currentClient.tiktok ? `
                  <a href="${currentClient.tiktok}" target="_blank" class="w-8 h-8 rounded-full flex items-center justify-center text-white hover:opacity-80 transition-opacity" style="background: #000000;" title="TikTok">
                    <i class="fab fa-tiktok text-sm"></i></a>` : ''}
                ${currentClient.youtube ? `
                  <a href="${currentClient.youtube}" target="_blank" class="w-8 h-8 rounded-full flex items-center justify-center text-white hover:opacity-80 transition-opacity" style="background: #FF0000;" title="YouTube">
                    <i class="fab fa-youtube text-sm"></i></a>` : ''}
                 ${(!currentClient.facebook && !currentClient.instagram && !currentClient.tiktok && !currentClient.youtube) ? '<p class="text-sm text-gray-500">No disponible</p>' : ''}
              </div>
            </div>
            
            <div>
              <h3 class="font-medium mb-2" style="color: ${currentClient.primaryColor || '#333'}">Otros Enlaces</h3>
              <div class="space-y-2">
                ${currentClient.mapsLink && currentClient.mapsLink !== "https://maps.app.goo.gl/mKuKNqi48YJ9URpb7" ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: ${currentClient.accentColor || '#777'}">
                      <i class="fas fa-map-marked-alt text-white text-sm"></i></div>
                    <a href="${currentClient.mapsLink}" target="_blank" class="text-sm hover:underline">Ver en mapa</a>
                  </div>` : ''}
                ${currentClient.website ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: ${currentClient.accentColor || '#777'}">
                      <i class="fas fa-globe text-white text-sm"></i></div>
                    <a href="${currentClient.website}" target="_blank" class="text-sm hover:underline">Sitio web</a>
                  </div>` : ''}
                ${currentClient.brochure ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: ${currentClient.accentColor || '#777'}">
                      <i class="fas fa-file-alt text-white text-sm"></i></div>
                    <a href="${currentClient.brochure}" target="_blank" class="text-sm hover:underline">Brochure/Catálogo</a>
                  </div>` : ''}
                ${currentClient.card ? `
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background: ${currentClient.accentColor || '#777'}">
                      <i class="fas fa-id-card text-white text-sm"></i></div>
                    <a href="${currentClient.card}" target="_blank" class="text-sm hover:underline">Tarjeta de Presentación</a>
                  </div>` : ''}
                ${(!currentClient.mapsLink || currentClient.mapsLink === "https://maps.app.goo.gl/mKuKNqi48YJ9URpb7") && !currentClient.website && !currentClient.brochure && !currentClient.card ? '<p class="text-sm text-gray-500">No disponible</p>' : ''}
              </div>
            </div>
          </div>
        </div>

        ${currentClient.phones && currentClient.phones.some(p => p.isPrimaryCta && p.whatsapp) ? `
          <div class="text-center p-6 border-t border-gray-200">
            <a href="https://wa.me/${currentClient.phones.find(p => p.isPrimaryCta).whatsapp.replace(/\+/g, '')}"
               target="_blank"
               class="inline-block px-8 py-3 rounded-full font-semibold text-white hover:shadow-lg transition-all text-lg"
               style="background: ${currentClient.accentColor || '#777'}; color: ${currentClient.primaryColor ? kontrastFarbe(currentClient.accentColor) : 'white'}">
              <i class="fab fa-whatsapp mr-2"></i> ${currentClient.phones.find(p => p.isPrimaryCta).ctaText}
            </a>
          </div>
        ` : ''}
      `;

      clientDetails.classList.remove('hidden');
    }
    
    // Función simple para determinar color de texto (blanco/negro) sobre un fondo
    function kontrastFarbe(hexColor) {
        if (!hexColor) return '#FFFFFF'; // Default to white for undefined background
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        const helligkeit = (r * 299 + g * 587 + b * 114) / 1000;
        return helligkeit > 125 ? '#000000' : '#FFFFFF';
    }


    // Mostrar formulario de edición
    function showEditForm() {
      if (!currentClient) return;

      document.getElementById('editId').value = currentClient.id;
      document.getElementById('editName').value = currentClient.name || '';
      document.getElementById('editSlogan').value = currentClient.slogan || '';
      document.getElementById('editAbout').value = currentClient.about || '';
      editPrimaryColor.value = currentClient.primaryColor || '#03152A';
      editPrimaryColorText.value = currentClient.primaryColor || '#03152A';
      editAccentColor.value = currentClient.accentColor || '#69D6E9';
      editAccentColorText.value = currentClient.accentColor || '#69D6E9';
      document.getElementById('editLocation').value = currentClient.location || '';
      document.getElementById('editMapsLink').value = currentClient.mapsLink || '';
      document.getElementById('editCategory').value = currentClient.category || '';
      document.getElementById('editType').value = currentClient.type || 'Empresa';

      clientDetails.classList.add('hidden');
      editFormModal.classList.remove('hidden');
    }

    // Guardar cambios del cliente
    function saveClientChanges(e) {
      e.preventDefault();
      if (!currentClient) return;

      const clientIndex = clients.findIndex(c => c.id === currentClient.id);
      if (clientIndex === -1) return;

      // Actualizar datos del cliente en el array 'clients'
      clients[clientIndex].name = document.getElementById('editName').value;
      clients[clientIndex].slogan = document.getElementById('editSlogan').value;
      clients[clientIndex].about = document.getElementById('editAbout').value;
      clients[clientIndex].primaryColor = editPrimaryColor.value;
      clients[clientIndex].accentColor = editAccentColor.value;
      clients[clientIndex].location = document.getElementById('editLocation').value;
      clients[clientIndex].mapsLink = document.getElementById('editMapsLink').value;
      clients[clientIndex].category = document.getElementById('editCategory').value;
      clients[clientIndex].type = document.getElementById('editType').value;
      
      // Actualizar currentClient también
      currentClient = { ...clients[clientIndex] };

      renderClientList(clients); // Re-renderizar toda la lista (o podrías actualizar solo la tarjeta modificada)
      
      editFormModal.classList.add('hidden');
      showClientDetails(currentClient.id); // Mostrar detalles actualizados

      alert('Cambios guardados (en memoria). Nota: Para persistir los cambios, necesitarías implementar el guardado en el servidor o almacenamiento local.');
    }

    // Buscar clientes
    function searchClients() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      if (!searchTerm) {
        renderClientList(clients);
        return;
      }

      const filteredClients = clients.filter(client =>
        (client.name && client.name.toLowerCase().includes(searchTerm)) ||
        (client.slogan && client.slogan.toLowerCase().includes(searchTerm)) ||
        (client.category && client.category.toLowerCase().includes(searchTerm)) ||
        (client.type && client.type.toLowerCase().includes(searchTerm)) ||
        (client.about && client.about.toLowerCase().includes(searchTerm)) ||
        (client.location && client.location.toLowerCase().includes(searchTerm)) ||
        (client.services && client.services.some(service => service.name && service.name.toLowerCase().includes(searchTerm)))
      );
      renderClientList(filteredClients);
    }

    // --- Event Listeners ---
    // Modales
    closeDetailsBtn.addEventListener('click', () => {
      clientDetails.classList.add('hidden');
      currentClient = null;
    });

    editClientBtn.addEventListener('click', () => {
      if (currentClient) {
        showEditForm();
      }
    });

    clientForm.addEventListener('submit', saveClientChanges);

    cancelEditBtn.addEventListener('click', () => {
      editFormModal.classList.add('hidden');
      if (currentClient) { // Si se cancela, volver a mostrar los detalles sin cambios
        showClientDetails(currentClient.id);
      }
    });
    
    closeEditBtn.addEventListener('click', () => {
      editFormModal.classList.add('hidden');
       if (currentClient) {
        showClientDetails(currentClient.id);
      }
    });

    // Búsqueda
    searchBtn.addEventListener('click', searchClients);
    searchInput.addEventListener('keyup', (event) => {
      if (event.key === 'Enter') {
        searchClients();
      } else { // Búsqueda en tiempo real (opcional, puedes quitar esto si prefieres solo con Enter o botón)
        searchClients();
      }
    });

    // Sincronización de Color Pickers con campos de texto
    function syncColorInputs(colorPicker, textInput) {
        colorPicker.addEventListener('input', (e) => {
            textInput.value = e.target.value.toUpperCase();
        });
        textInput.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            if (/^#[0-9A-F]{6}$/.test(val)) {
                colorPicker.value = val;
            }
        });
         // Ensure text input reflects initial color picker value if different format (e.g. rgb)
        textInput.value = colorPicker.value.toUpperCase();
    }

    syncColorInputs(editPrimaryColor, editPrimaryColorText);
    syncColorInputs(editAccentColor, editAccentColorText);

    // Carga inicial de clientes
    document.addEventListener('DOMContentLoaded', loadClients);
  </script>
</body>
</html>
